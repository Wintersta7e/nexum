name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A push that arrives while a previous run for the same ref is still
# going cancels the in-flight one — saves runner minutes on rapid
# pushes without losing the latest result.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  gate:
    name: Three-command gate (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        # rust-toolchain.toml at repo root pins channel 1.95.0 + clippy + rustfmt.
        run: rustup show

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --locked --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --locked --workspace --all-targets

      - name: cargo test
        run: cargo test --locked --workspace --all-targets
