name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A push that arrives while a previous run for the same ref is still
# going cancels the in-flight one — saves runner minutes on rapid
# pushes without losing the latest result.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  gate:
    name: Three-command gate (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Rust toolchain
        # rust-toolchain.toml at repo root pins channel 1.95.0 + clippy + rustfmt.
        run: rustup show

      - name: Configure git identity for tests
        # The init_cli.rs subprocess test shells out to `git commit` from
        # nexum init's bootstrap-commit path. CI runners have no global
        # git config; without an identity, the commit fails before any
        # nexum logic runs. Generic CI identity matches the rest of the
        # subprocess test pattern (`nexum-test@example.invalid`).
        run: |
          git config --global user.name "nexum-ci"
          git config --global user.email "nexum-ci@example.invalid"

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --locked --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --locked --workspace --all-targets

      - name: cargo test
        run: cargo test --locked --workspace --all-targets
