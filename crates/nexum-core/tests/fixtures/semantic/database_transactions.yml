title: Choosing the right SQLite transaction kind
body: |
  rusqlite exposes three transaction kinds. Deferred is the default
  and acquires a SHARED lock on first read, escalating to RESERVED
  on first write. Immediate grabs RESERVED up front, which is what
  you want for writer-heavy code paths so a long-running reader
  cannot starve the upgrade. Exclusive is rarely needed outside
  bulk-load or schema-change windows where every other connection
  must be paused.
