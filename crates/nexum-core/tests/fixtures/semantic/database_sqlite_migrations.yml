title: Versioning SQLite schemas with user_version
body: |
  The SQLite PRAGMA user_version is a single 32-bit integer the
  application can stamp on a file and read back to decide which
  migrations to run. The pattern is to keep each migration as a
  pure SQL file numbered by target version, then on open: read
  user_version, run every migration whose target is strictly
  greater inside a single transaction, and stamp the new version
  on commit so a crash mid-upgrade leaves the file unchanged.
