title: Designing covering B-tree indexes for read paths
body: |
  A B-tree index in SQLite stores its key columns plus a row id
  pointer back into the underlying table. When a query reads
  columns the index does not cover, the engine pays one extra
  random read per row to fetch the table page. Adding the
  missing columns as trailing key entries turns the lookup into
  a single sequential scan over the index leaves, at the cost
  of larger index pages on write.
