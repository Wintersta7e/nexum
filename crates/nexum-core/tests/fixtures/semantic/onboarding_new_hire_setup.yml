title: First-week setup checklist for a new hire
body: |
  Day one of a new hire should never be spent waiting on IT.
  Pre-provision the laptop, the SSO accounts, and the VPN profile
  before the start date so the first hour is spent on introductions,
  not on password resets. The checklist that survives contact with
  reality has three sections: accounts and access, dev environment
  bootstrap, and a 30-60-90 ramp plan owned by the hiring manager.
