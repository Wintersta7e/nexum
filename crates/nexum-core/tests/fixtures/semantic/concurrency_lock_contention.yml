title: Reducing contention on a hot mutex
body: |
  When a single mutex is the bottleneck under load, the usual moves
  are: shard the protected state across N stripes keyed by hash so
  most acquisitions miss each other; replace the lock with an
  RwLock when reads dominate writes; or step out of the locked
  region entirely with a lock-free queue and a single consumer task.
  Profile first: perf-stat or tokio-console will show whether the
  wait time is actually inside the critical section or outside it.
