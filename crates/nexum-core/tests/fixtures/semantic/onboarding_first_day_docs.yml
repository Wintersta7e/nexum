title: First-day reading list for new engineers
body: |
  Curate a short reading list for every new engineer's first day:
  the README of the main service, the deploy runbook, the
  postmortem of the most recent customer-visible incident, and
  the page that describes how the team chooses what to work on.
  Long enough to give context, short enough to finish before lunch.
  Pair it with a 30 minute walkthrough by the buddy assigned to
  the hire.
